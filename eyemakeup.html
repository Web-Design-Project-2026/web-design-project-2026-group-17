<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <link rel="stylesheet" href="css/style.css" />

     <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>

  <body>
    <header>
      <nav class="site-nav">
        <ul class="nav-list">
          <li class="nav-left">
            <a href="index.html">
              <img class="logo" src="images/big-logo-black.png" alt="logo" />
            </a>
          </li>

          <li class="nav-right">
            <a href="productpage.html">Products</a>
            <a href="#"> About us</a>
            <a href="#"> Customer service</a>
            <a href="cart.html">
              <img class="shopping-cart" src="images/shopping-cart-icon.png.webp" alt=" shopping cart" />
            </a>
          </li>
        </ul>
      </nav>

    <!--HEADER WITH NAVIGATION BAR-->
    <main>
     

      <!--MAIN HEADER IMAGE-->
      <section class="main-images">
        <img class="header-image" src="images/eyemakeup-banner.png" alt="Eye-makeup">
      </section>

     


    <!--CATEGORIES-->
      <section class="product-categories">
        <a href="#" class="category-btn active">All</a>
        <a href="#" class="category-btn">Base</a>
        <a href="#" class="category-btn">Eye-makeup</a>
        <a href="#" class="category-btn">Powder</a>
        <a href="#" class="category-btn">Lipstick</a>
      </section>

      <!--CONTAIINER WITH ALL PRODUCTS-->
      <section class="product-container">



     <div class="product-card">
            <a href="#">
                <img class="product-image" src="images/three-palett-big-logo.png" alt="The Signature Eye Set">
            </a>
            <h2>The signature Eye Set</h2>
            <p class="price">749 Kr</p>
         </div>




             <div class="product-card">
            <a href="#">
                <img class="product-image" src="images/orange-eyeshadow-vc.png" alt="Velvet Dusk Palette">
            </a>
            <h2>Velvet Dusk Palette</h2>
            <p class="price">289 Kr</p>

             <div class="product-card">
            <a href="#">
                <img class="product-image" src="images/pink-eyeshadow.png" alt="Blush Veil Palette">
            </a>

             <div class="product-card">

          <div class="product-card">
            <a href="#">
                <img class="product-image" src="images/brow-styler-gel.png" alt="Velvet Clear Brows">
            </a>
            <h2>Velvet Clear Brows</h2>
            <p class="price">119 Kr</p>
         </div>

    <!--Footer-->
    <footer>
      <div class="footer-links">
        <p>Home</p>
        <p>Products</p>
        <p>About Us</p>
        <p>Cart</p>
