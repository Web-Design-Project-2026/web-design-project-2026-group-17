<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>

    <link rel="stylesheet" href="css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="logo">Velouré Cosmetics</div>

      <nav>
        <ul class="nav-right">
          <a href="#">Products</a>
          <a href="#"> About us</a>
          <a href="#"> Customer service</a>
          <a href="#">
            <img class="shopping-cart" src="" alt=" shopping cart" />
          </a>
        </ul>
      </nav>
    </header>

    <main class="container cart-page">
      <h1>YOUR SHOPPING CART</h1>
      <p>Add items from the Products page to see them here</p>
      <div id="cart-item"></div>

      <div class="cart-total">
        <h2>Total: <span id="cartTotal">0</span> SEK</h2>
        <a href="checkout.html" class="checkout-btn">Checkout</a>
      </div>
    </main>

    <!--Footer-->
    <footer>
      <div class="footer-links">
        <p>Home</p>
        <p>Products</p>
        <p>About Us</p>
        <p>Cart</p>
      </div>

      <div class="footer-right">
        <div class="footer-logo">
          <img src="Images/biglogoblack.png" alt="Big black logo" />
        </div>
        <div class="footer-bottom">© Velouré Cosmetics 2026</div>
      </div>
    </footer>
  </body>
</html>
